version: '3.8'

services:
  # NEW: Scraper service
  scraper:
    build:
      context: .
      dockerfile: Scraper/Dockerfile
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    build:
      context: .
      dockerfile: property-agent/Dockerfile
    environment:
      - PORT=8002
      - API_SALES_URL=http://api:8001
      - SCRAPER_URL=http://scraper:8000
      - GOOGLE_GENAI_USE_VERTEXAI=false
    env_file:
      - property-agent/.env
    ports:
      - "8002:8002"
    depends_on:
      scraper:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: .
      dockerfile: streamlit-app/Dockerfile
    environment:
      - PORT=8501
      - AGENT_API_URL=http://agent:8002/chat
    ports:
      - "8501:8501"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
