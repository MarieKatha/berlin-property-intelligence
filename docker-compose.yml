services:
  api_sales:
    build:
      context: .
      dockerfile: api_sales/Dockerfile
    environment:
      - PORT=8001
    ports:
      - "8001:8001"

  agent:
    build:
      context: .
      dockerfile: property-agent/Dockerfile
    environment:
      - PORT=8002
      - API_SALES_URL=http://api_sales:8001
      # No GCP Application Default Credentials in the container -- force the
      # plain GEMINI_API_KEY path instead of Vertex AI (overrides .env below).
      - GOOGLE_GENAI_USE_VERTEXAI=false
    env_file:
      - property-agent/.env
    ports:
      - "8002:8002"
    depends_on:
      - api_sales

  streamlit:
    build:
      context: .
      dockerfile: streamlit-app/Dockerfile
    environment:
      - PORT=8501
      - AGENT_API_URL=http://agent:8002/chat
    ports:
      - "8501:8501"
    depends_on:
      - agent
