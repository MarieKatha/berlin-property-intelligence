services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    healthcheck:
      # Plain TCP connect via the stdlib (no curl/wget in python:3.12) -- by
      # the time uvicorn binds this port, api/fast.py's module-level model
      # loading has already finished, so a successful connect is enough.
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  agent:
    build:
      context: .
      dockerfile: property-agent/Dockerfile
    environment:
      - PORT=8002
      - API_SALES_URL=http://api:8001
      # No GCP Application Default Credentials in the container -- force the
      # plain GEMINI_API_KEY path instead of Vertex AI (overrides .env below).
      - GOOGLE_GENAI_USE_VERTEXAI=false
    env_file:
      - property-agent/.env
    ports:
      - "8002:8002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  streamlit:
    build:
      context: .
      dockerfile: streamlit-app/Dockerfile
    environment:
      - PORT=8501
      - AGENT_API_URL=http://agent:8002/chat
    ports:
      - "8501:8501"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,socket; socket.create_connection((\"localhost\", int(os.environ[\"PORT\"])), timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
